# exo-cross.ini — Meson cross-file for building mlibc targeting EXO_OS
#
# Usage:
#   meson setup build --cross-file exo-cross.ini \
#       -Dbuild_tests=false \
#       -Dlinux_kernel_headers=disabled
#
# Adjust paths to your cross toolchain.

[binaries]
c       = 'x86_64-elf-gcc'
cpp     = 'x86_64-elf-g++'
ar      = 'x86_64-elf-ar'
strip   = 'x86_64-elf-strip'
pkgconfig = 'pkg-config'

[host_machine]
system     = 'exo'
cpu_family = 'x86_64'
cpu        = 'x86_64'
endian     = 'little'

[properties]
# Point mlibc to our sysdep directory
# mlibc_sysdep_dir = 'sysdeps/exo'
